<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Hi ^_^</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      /* Tiled Pedro raccoon dancing GIF (embedded from provided URL) */
      background-image: url('https://media1.tenor.com/m/sO_K0lGNmegAAAAd/pedro-pedro-pedro-party-racoon.gif');
      background-repeat: repeat;        /* tiled */
      background-size: auto;           /* change to a specific size like "150px" to resize tiles */
      background-position: top left;
      background-attachment: scroll;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .panel {
      background: rgba(0, 0, 0, 0.36);
      padding: 2rem 2.5rem;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.35);
      backdrop-filter: blur(4px);
      text-align: center;
      max-width: 90%;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.6rem, 5vw, 3.5rem);
      line-height: 1;
      letter-spacing: 0.02em;
      text-shadow: 0 2px 6px rgba(0,0,0,0.6);
    }

    p {
      margin: 0.6rem 0 0;
      color: rgba(255,255,255,0.95);
      font-size: 1rem;
    }

    @media (max-width: 420px) {
      .panel { padding: 1rem 1.2rem; }
    }
  </style>
</head>
<body>
  <main class="panel" role="main" aria-label="Greeting">
    <h1 id="quote"></h1>
  </main>

  <script>
    /*
      To set the quotes you want, edit the QUOTES array below. Each entry should be a string.
      The page will pick one at random on load. Click the heading to get another random quote.
    */
    const QUOTES = [
      "Naveer Giv Up Fren",
      "Just because I'm trash, doesn't mean I can't do great things. It's called garbage can, not garbage can not"
    ];

    function pickQuote() {
      if (!Array.isArray(QUOTES) || QUOTES.length === 0) return 'Hi ^_^';
      return QUOTES[Math.floor(Math.random() * QUOTES.length)];
    }

    document.addEventListener('DOMContentLoaded', () => {
      const h1 = document.getElementById('quote');
      if (!h1) return;

      // Make the heading accessible for announcements
      h1.setAttribute('aria-live', 'polite');
      h1.style.cursor = 'pointer';

      const apply = () => {
        const q = pickQuote();
        h1.textContent = q;
        // also update the document title so browser tabs show the quote
        document.title = q;
      };

      // initial random quote
      apply();

      // clicking the heading picks another random quote
      h1.addEventListener('click', apply);
    });
  </script>
</body>
</html>
