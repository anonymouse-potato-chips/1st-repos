<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Hi ^_^</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      /* Tiled Pedro raccoon dancing GIF (embedded from provided URL) */
      background-image: url('https://media1.tenor.com/m/sO_K0lGNmegAAAAd/pedro-pedro-pedro-party-racoon.gif');
      background-repeat: repeat;        /* tiled */
      background-size: auto;           /* change to a specific size like "150px" to resize tiles */
      background-position: top left;
      background-attachment: scroll;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .panel {
      background: rgba(0, 0, 0, 0.36);
      padding: 2rem 2.5rem;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.35);
      backdrop-filter: blur(4px);
      text-align: center;
      max-width: 90%;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.6rem, 5vw, 3.5rem);
      line-height: 1;
      letter-spacing: 0.02em;
      text-shadow: 0 2px 6px rgba(0,0,0,0.6);
    }

    p {
      margin: 0.6rem 0 0;
      color: rgba(255,255,255,0.95);
      font-size: 1rem;
    }

    @media (max-width: 420px) {
      .panel { padding: 1rem 1.2rem; }
    }
  </style>
</head>
<body>
  <main class="panel" role="main" aria-label="Greeting">
    <h1>Hi ^_^</h1>
    <p>Background: Pedro raccoon dancing (tiled) — using the GIF provided.</p>
  </main>
</body>
</html>
